name: Generate iCal feed

on:
  schedule:
    # Run every day at 06:00 UTC (roughly before the US school day)
    - cron: "0 6 * * *"
  workflow_dispatch:          # allow manual trigger from the Actions tab
  push:
    branches: [main]         # also run on pushes so Pages deploys on first commit

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate iCal file
        env:
          BUILDING_ID: ${{ vars.BUILDING_ID || '930a6424-06f4-ed11-84af-fa270f46f553' }}
          DISTRICT_ID: ${{ vars.DISTRICT_ID || 'd9bd5361-fbf3-ed11-84ae-8f8c34831c13' }}
        run: |
          mkdir -p _site
          python generate_ical.py --output _site/school-menu.ics

          # Also write a tiny index.html so Pages has a landing page
          cat > _site/index.html <<'EOHTML'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>School Menu iCal Feed</title></head>
          <body style="font-family:system-ui,sans-serif;max-width:600px;margin:4rem auto;padding:0 1rem">
            <h1>School Menu iCal Feed</h1>
            <p>Subscribe to this calendar in your calendar app:</p>
            <pre id="url" style="background:#f3f3f3;padding:1rem;border-radius:6px;overflow-x:auto"></pre>
            <p><a id="dl" href="school-menu.ics">Download .ics file</a></p>
            <script>
              // Build the webcal:// URL dynamically from the current page location
              const base = location.href.replace(/index\.html$/, '').replace(/\/$/, '');
              const icsUrl = base + '/school-menu.ics';
              document.getElementById('url').textContent = icsUrl.replace(/^https?/, 'webcal');
              document.getElementById('dl').href = 'school-menu.ics';
            </script>
          </body>
          </html>
          EOHTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
